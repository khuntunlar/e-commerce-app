services:
  mysql:
    image: mysql:8.4
    container_name: ecommerce-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - ecommerce_mysql_data:/var/lib/mysql
      - ./src/IdentityService.Infrastructure/Persistence/Migrations/202607030001_InitialIdentitySchema.mysql.sql:/docker-entrypoint-initdb.d/001-initial-identity.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  identity-api:
    build:
      context: .
      dockerfile: src/IdentityService.Api/Dockerfile
    container_name: ecommerce-identity-api
    environment:
      ASPNETCORE_ENVIRONMENT: Container
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Identity: Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${IDENTITY_DB_PASSWORD};
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN}
    ports:
      - "5294:8080"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: src/Ecommerce.Web/Dockerfile
      args:
        NEXT_PUBLIC_IDENTITY_API_URL: ${IDENTITY_PUBLIC_URL}
    container_name: ecommerce-web
    environment:
      IDENTITY_API_URL: http://identity-api:8080
      NEXT_PUBLIC_IDENTITY_API_URL: ${IDENTITY_PUBLIC_URL}
    ports:
      - "3000:3000"
    depends_on:
      - identity-api

volumes:
  ecommerce_mysql_data:
