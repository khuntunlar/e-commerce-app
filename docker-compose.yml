services:
  mysql:
    image: mysql:8.4
    container_name: ecommerce-mysql
    environment:
      MYSQL_DATABASE: ecommerce_with_dot_net
      MYSQL_USER: khuntunlar
      MYSQL_PASSWORD: khuntunlar2024
      MYSQL_ROOT_PASSWORD: khuntunlar2024
    ports:
      - "3307:3306"
    volumes:
      - ecommerce_mysql_data:/var/lib/mysql
      - ./src/IdentityService.Infrastructure/Persistence/Migrations/202607030001_InitialIdentitySchema.mysql.sql:/docker-entrypoint-initdb.d/001-initial-identity.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ukhuntunlar", "-pkhuntunlar2024"]
      interval: 10s
      timeout: 5s
      retries: 10

  identity-api:
    build:
      context: .
      dockerfile: src/IdentityService.Api/Dockerfile
    container_name: ecommerce-identity-api
    environment:
      ASPNETCORE_ENVIRONMENT: Container
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Identity: Server=mysql;Port=3306;Database=ecommerce_with_dot_net;User=khuntunlar;Password=khuntunlar2024;
      Jwt__Issuer: IdentityService
      Jwt__Audience: EcommercePlatform
      Jwt__SigningKey: development-signing-key-please-change
      Cors__AllowedOrigins__0: http://localhost:3000
    ports:
      - "5294:8080"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: src/Ecommerce.Web/Dockerfile
      args:
        NEXT_PUBLIC_IDENTITY_API_URL: http://localhost:5294
    container_name: ecommerce-web
    environment:
      NEXT_PUBLIC_IDENTITY_API_URL: http://localhost:5294
    ports:
      - "3000:3000"
    depends_on:
      - identity-api

volumes:
  ecommerce_mysql_data:
