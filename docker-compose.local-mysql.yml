# Use this override when you want API containers to store data in your local machine MySQL.
# Command:
#   docker compose -f docker-compose.yml -f docker-compose.local-mysql.yml up --build
#
# Local MySQL must have both databases:
#   identity_service
#   catalog_service

services:
  identity-mysql:
    profiles:
      - docker-mysql

  catalog-mysql:
    profiles:
      - docker-mysql

  identity-api:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ConnectionStrings__Identity: Server=host.docker.internal;Port=3306;Database=${IDENTITY_MYSQL_DATABASE};User=${MYSQL_USER};Password=${IDENTITY_DB_PASSWORD};
    depends_on: !reset []

  catalog-api:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ConnectionStrings__Catalog: Server=host.docker.internal;Port=3306;Database=${CATALOG_MYSQL_DATABASE};User=${MYSQL_USER};Password=${CATALOG_DB_PASSWORD};
    depends_on: !reset []
