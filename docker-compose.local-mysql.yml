# Use this override when you want the API container to store data in your local machine MySQL.
# Command:
#   docker compose -f docker-compose.yml -f docker-compose.local-mysql.yml up --build
#
# Important for Linux:
# - MySQL on the host must accept TCP connections from Docker.
# - Your database/user must exist in local MySQL.
# - phpMyAdmin must point to the same local MySQL server to see the same data.

services:
  # Put the Docker MySQL service behind a profile so it will not start in local-MySQL mode.
  mysql:
    profiles:
      - docker-mysql

  identity-api:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ConnectionStrings__Identity: Server=host.docker.internal;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${IDENTITY_DB_PASSWORD};
    depends_on: !reset []
